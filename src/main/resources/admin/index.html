<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceNova Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07131a;
      --bg-soft: #0d1b23;
      --bg-panel: rgba(14, 30, 38, 0.88);
      --bg-elevated: #132730;
      --line: rgba(137, 194, 180, 0.14);
      --line-strong: rgba(137, 194, 180, 0.3);
      --text: #f1f6f4;
      --muted: #99aaa5;
      --teal: #56d4c0;
      --sky: #7bc2ff;
      --amber: #ffbf70;
      --coral: #ff886e;
      --green: #72d58a;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(86, 212, 192, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(123, 194, 255, 0.16), transparent 26%),
        linear-gradient(180deg, #081319 0%, #050c10 100%);
      color: var(--text);
      font-family: "Instrument Sans", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    button, input, select, textarea {
      font: inherit;
    }

    #root {
      min-height: 100vh;
    }

    .boot-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .boot-card {
      width: min(520px, 100%);
      padding: 24px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: rgba(11, 26, 33, 0.82);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .boot-card h1 {
      margin: 0 0 10px;
      font-size: 26px;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: -0.03em;
    }

    .boot-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .admin-shell {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 28px 22px;
      border-right: 1px solid var(--line);
      background: rgba(7, 19, 26, 0.9);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      display: grid;
      gap: 8px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(86, 212, 192, 0.12), rgba(123, 194, 255, 0.08));
      box-shadow: var(--shadow);
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--teal), var(--sky));
      color: #032028;
      font-size: 24px;
      font-weight: 700;
      font-family: "Space Grotesk", sans-serif;
    }

    .brand-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .nav {
      display: grid;
      gap: 10px;
    }

    .nav-button {
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      transition: 180ms ease;
    }

    .nav-button:hover,
    .nav-button.active {
      color: var(--text);
      border-color: var(--line);
      background: rgba(19, 39, 48, 0.82);
      transform: translateX(2px);
    }

    .nav-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }

    .nav-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(86, 212, 192, 0.08);
      color: var(--teal);
      font-size: 16px;
    }

    .status-card {
      margin-top: auto;
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(19, 39, 48, 0.65);
      display: grid;
      gap: 10px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(114, 213, 138, 0.12);
      color: var(--green);
      font-size: 13px;
      font-weight: 600;
    }

    .pulse {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 0 0 rgba(114, 213, 138, 0.5);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(114, 213, 138, 0.5); }
      100% { box-shadow: 0 0 0 12px rgba(114, 213, 138, 0); }
    }

    .main {
      padding: 30px;
      display: grid;
      gap: 22px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      padding: 28px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(18, 44, 52, 0.96), rgba(9, 24, 30, 0.88)),
        rgba(10, 21, 26, 0.8);
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.04;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 12px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: -0.01em;
      transition: 180ms ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      background: linear-gradient(135deg, var(--teal), var(--sky));
      color: #05212a;
      box-shadow: 0 12px 24px rgba(86, 212, 192, 0.18);
    }

    .button-ghost {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-color: var(--line);
    }

    .button-danger {
      background: rgba(255, 136, 110, 0.12);
      color: var(--coral);
      border-color: rgba(255, 136, 110, 0.28);
    }

    .grid-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--bg-panel);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .metric-card {
      display: grid;
      gap: 14px;
      min-height: 168px;
    }

    .metric-card small,
    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 11px;
      font-weight: 700;
    }

    .metric-value {
      font-size: 40px;
      line-height: 1;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: -0.06em;
    }

    .metric-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .metric-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .metric-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--sky));
    }

    .split-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 18px;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel-title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .panel-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .badge {
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-teal { background: rgba(86, 212, 192, 0.12); color: var(--teal); }
    .badge-sky { background: rgba(123, 194, 255, 0.12); color: var(--sky); }
    .badge-amber { background: rgba(255, 191, 112, 0.14); color: var(--amber); }
    .badge-coral { background: rgba(255, 136, 110, 0.14); color: var(--coral); }
    .badge-green { background: rgba(114, 213, 138, 0.14); color: var(--green); }

    .stack {
      display: grid;
      gap: 14px;
    }

    .call-row,
    .fact-row,
    .event-row,
    .source-row {
      border: 1px solid var(--line);
      background: rgba(11, 26, 33, 0.72);
      border-radius: var(--radius-md);
      padding: 16px;
    }

    .call-row {
      display: grid;
      gap: 10px;
      cursor: pointer;
      transition: 180ms ease;
    }

    .call-row:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .call-topline,
    .inline-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .call-id {
      font-size: 13px;
      color: var(--muted);
      word-break: break-all;
    }

    .call-parties {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .call-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .key-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .key-tile {
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: rgba(9, 24, 30, 0.75);
    }

    .key-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .key-value {
      font-size: 16px;
      font-weight: 700;
      word-break: break-word;
      line-height: 1.45;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .event-row {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(8, 20, 25, 0.82);
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .event-stage-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .event-stage {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(86, 212, 192, 0.1);
      color: var(--teal);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .event-message {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .event-details {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .event-details strong {
      color: var(--text);
      font-weight: 600;
    }

    .event-detail-block {
      display: grid;
      gap: 6px;
    }

    .event-detail-inline {
      color: var(--text);
    }

    .event-detail-pre {
      margin: 0;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: rgba(5, 12, 16, 0.92);
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .form-row {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    input,
    select,
    textarea {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: rgba(7, 19, 26, 0.75);
      color: var(--text);
      padding: 13px 14px;
      outline: none;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(86, 212, 192, 0.12);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(11, 26, 33, 0.68);
      color: var(--muted);
      font-size: 13px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .pill strong {
      color: var(--text);
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: var(--radius-md);
      padding: 22px;
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(11, 26, 33, 0.96);
      border: 1px solid var(--line-strong);
      color: var(--text);
      box-shadow: var(--shadow);
      max-width: 360px;
      z-index: 30;
    }

    .loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .loading::before {
      content: "";
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(123, 194, 255, 0.24);
      border-top-color: var(--sky);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1180px) {
      .admin-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .grid-metrics,
      .split-grid,
      .key-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .main {
        padding: 18px;
      }

      .hero {
        padding: 20px;
        flex-direction: column;
      }

      .panel {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot-screen">
      <div class="boot-card">
        <h1>Loading VoiceNova Admin</h1>
        <p>The control room is starting. If this message stays on screen, refresh once and the inline error helper will show what failed.</p>
      </div>
    </div>
  </div>
  <script>
    window.addEventListener("error", function (event) {
      var root = document.getElementById("root");
      if (!root) return;
      root.innerHTML =
        '<div class="boot-screen"><div class="boot-card"><h1>Admin panel could not start</h1><p>' +
        String((event && event.message) || "Unknown browser error") +
        '</p></div></div>';
    });
  </script>
  <script src="/admin/vendor/react.production.min.js"></script>
  <script src="/admin/vendor/react-dom.production.min.js"></script>
  <script src="/admin/vendor/htm.umd.js"></script>
  <script src="/admin/app.js"></script>
</body>
</html>
